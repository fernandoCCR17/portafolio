<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Proyectos</title>
    <link rel="shortcut icon" href="img/LogoFer.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/minStyle.css">
</head>

<body class="skills">
    <header class="header header__proyectos">
        <div class="container d-flex justify-content-between align-items-center py-4">
            <a href="index.html" class="d-flex align-items-center text-decoration-none">
                <img src="img/LogoFer.svg" alt="Logo de la página" class="header__logo" width="500" height="300">
                <p class="header__autor">Fernando <br class="header__enter">de la Cruz Ramos</p>
            </a>

            <img id="botonMostrar" class="img-fluid header__bars" src="img/bars.svg" alt="icono barras" width="500" height="300">

            <nav id="navegacion" class="navegador navegador--translate">
                <div
                    class="navegador__fondo d-flex justify-content-center flex-column px-5 gap-5 gap-md-3 text-uppercase flex-md-row">
                    <div class="navegador__contenedor">
                        <a href="index.html" class="fw-bold navegador__enlace">Inicio</a>
                    </div>
                    <div class="navegador__contenedor">
                        <a href="index.html#sobreMi" class="fw-bold navegador__enlace">Sobre mi</a>
                    </div>
                    <div class="navegador__contenedor">
                        <a href="index.html#Conocimientos" class="fw-bold navegador__enlace">Conocimientos</a>
                    </div>
                    <div class="navegador__contenedor">
                        <a href="index.html#proyectos" class="fw-bold navegador__enlace">Proyectos</a>
                    </div>
                    <div class="navegador__contenedor">
                        <a href="index.html#certificaciones" class="fw-bold navegador__enlace">Certificaciones</a>
                    </div>
                    <button type="button" id="botonCerrar" class="navegador__cierre fw-bold">X</button>
                </div>
            </nav>
        </div>
    </header>

    <main class="main__proyectos">
        <svg class="wave2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
            <path fill="#0D0B0B" fill-opacity="1"
                d="M0,224L30,197.3C60,171,120,117,180,117.3C240,117,300,171,360,165.3C420,160,480,96,540,58.7C600,21,660,11,720,10.7C780,11,840,21,900,48C960,75,1020,117,1080,133.3C1140,149,1200,139,1260,144C1320,149,1380,171,1410,181.3L1440,192L1440,0L1410,0C1380,0,1320,0,1260,0C1200,0,1140,0,1080,0C1020,0,960,0,900,0C840,0,780,0,720,0C660,0,600,0,540,0C480,0,420,0,360,0C300,0,240,0,180,0C120,0,60,0,30,0L0,0Z">
            </path>
        </svg>
        <div class="proyectos__container container-xl overflow-hidden">
            <h1 class="text-center h2__proyectos text-uppercase fw-bold fs-1 text-dark">Proyectos</h1>
            <form id="formulario" class="d-flex align-items-center justify-content-center gap-3 mb-4">
                <div class="select-dropdown">
                    <div id="dropdownContainer" class="dropdown-container">
                        <div class="dropdown-select">
                            <span class="select">Tecnologia</span>
                            <ion-icon name="chevron-down-outline"></ion-icon>
                        </div>
                    </div>
                    <div id="dropdownList" class="dropdown-list">
                        <div>
                            <input class="form-check-input" type="checkbox" value="HTML" name="HTML" id="inputHTML">
                            <label class="form-check-label" for="inputHTML">
                                HTML
                            </label>
                        </div>
                        <!-- fin del checbox -->
                        <div>
                            <input class="form-check-input" type="checkbox" value="CSS" name="CSS" id="inputCSS">
                            <label class="form-check-label" for="inputCSS">
                                CSS
                            </label>
                        </div>
                        <!-- fin del checbox -->
                        <div>
                            <input class="form-check-input" type="checkbox" value="JS" name="JS" id="inputJS">
                            <label class="form-check-label" for="inputJS">
                                JAVASCRIPT
                            </label>
                        </div>
                        <!-- fin del checbox -->
                        <div>
                            <input class="form-check-input" type="checkbox" value="SASS" name="SASS" id="inputSASS">
                            <label class="form-check-label" for="inputSASS">
                                SASS
                            </label>
                        </div>
                        <!-- fin del checbox -->
                        <div>
                            <input class="form-check-input" type="checkbox" value="REACT" name="REACT" id="inputREACT">
                            <label class="form-check-label" for="inputREACT">
                                REACT
                            </label>
                        </div>
                        <!-- fin del checbox -->
                        <div>
                            <input class="form-check-input" type="checkbox" value="NODE" name="NODE" id="inputNODE">
                            <label class="form-check-label" for="inputNODE">
                                NODE
                            </label>
                        </div>
                        <!-- fin del checbox -->
                        <div>
                            <input class="form-check-input" type="checkbox" value="API" name="API" id="inputAPI">
                            <label class="form-check-label" for="inputAPI">
                                API
                            </label>
                        </div>
                        <!-- fin del checbox -->
                    </div>
                </div>

                <div class="zIndex">
                    <select id="inputOrigen" name="ORIGEN" class="form-select form-select-lg" aria-label="Default select example">
                        <option value="" selected disabled>Origen</option>
                        <option value="CSS La Guía Completa">CSS La Guía Completa</option>
                        <option value="JavaScript Moderno">JavaScript Moderno</option>
                        <option value="Universidad">Universidad</option>
                        <option value="frontend">FrontEndMentor</option>
                      </select>
                </div>
                <input type="submit" value="Buscar" class="btn btn-success fw-bold zIndex">
            </form>
            <div id="alertas"></div>
            <div class="row" id="proyectos">

            </div>
        </div>
    </main>

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320">
        <path fill="#0D0B0B" fill-opacity="1"
            d="M0,192L40,176C80,160,160,128,240,128C320,128,400,160,480,176C560,192,640,192,720,192C800,192,880,192,960,192C1040,192,1120,192,1200,202.7C1280,213,1360,235,1400,245.3L1440,256L1440,320L1400,320C1360,320,1280,320,1200,320C1120,320,1040,320,960,320C880,320,800,320,720,320C640,320,560,320,480,320C400,320,320,320,240,320C160,320,80,320,40,320L0,320Z">
        </path>
    </svg>

    <a target="_blank" href="https://www.linkedin.com/in/fernandodelacruzramos/" class="linkedin">
        <ion-icon class="icon__linkedin" name="logo-linkedin"></ion-icon>
    </a>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script src="js/minApp.js"></script>
    <script src="js/minDB.js"></script>
</body>

</html>
